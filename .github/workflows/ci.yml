name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package and test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "[test]"

    - name: Run tests
      run: |
        pytest --tb=short

    - name: Check CLI entry point
      run: |
        hashline --help || python -m hashline --help

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dev tools
      run: |
        pip install --upgrade pip
        pip install -e "[dev]"
    - name: Ruff lint
      run: ruff check .
    - name: Ruff format check
      run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dev tools
      run: |
        pip install --upgrade pip
        pip install -e "[dev]"
    - name: mypy type check
      run: |
        mypy hashline --ignore-missing-imports

  demo:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install the package
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Run end-to-end demo (base + gemini)
      run: |
        python tests/harness_demo.py --models base gemini
